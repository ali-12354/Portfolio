<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management System Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #242433;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --text: #e8e8f0;
    --muted: #8b8ba3;
    --white: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'DM Sans', sans-serif;
    background:
      radial-gradient(circle at top left, rgba(0,212,255,0.12), transparent 35%),
      radial-gradient(circle at bottom right, rgba(124,58,237,0.14), transparent 28%),
      var(--bg);
    color: var(--text);
  }
  .shell {
    max-width: 1280px;
    margin: 0 auto;
    padding: 2rem 1rem 3rem;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
    padding: 1rem 1.2rem;
    border: 1px solid var(--border);
    background: rgba(17,17,24,0.8);
    backdrop-filter: blur(12px);
    border-radius: 18px;
  }
  .brand {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--white);
  }
  .back {
    color: var(--text);
    text-decoration: none;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    padding: 0.7rem 1rem;
    border-radius: 999px;
    font-weight: 600;
  }
  .hero {
    padding: 1rem 0 1.5rem;
  }
  .eyebrow {
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.75rem;
    font-weight: 700;
    margin-bottom: 0.6rem;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 4vw, 3.6rem);
    line-height: 1.05;
    margin: 0 0 0.75rem;
    color: var(--white);
  }
  .desc {
    max-width: 760px;
    color: var(--muted);
    margin: 0;
    line-height: 1.7;
  }
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1rem;
    margin-top: 1.5rem;
  }
  figure {
    margin: 0;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--card);
  }
  figure a { display: block; text-decoration: none; }
  img {
    width: 100%;
    display: block;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    object-position: top;
    background: #0d0d14;
  }
  figcaption {
    padding: 1rem;
  }
  figcaption strong {
    display: block;
    color: var(--white);
    margin-bottom: 0.25rem;
    font-family: 'Syne', sans-serif;
  }
  figcaption span {
    color: var(--muted);
    font-size: 0.9rem;
  }
  .hint {
    margin-top: 1rem;
    color: var(--muted);
    font-size: 0.9rem;
  }
</style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand">Ali Haroon Portfolio</div>
      <a class="back" href="index (1).html">Back to portfolio</a>
    </div>

    <section class="hero">
      <div class="eyebrow">Project 02</div>
      <h1>Student Management System Gallery</h1>
      <p class="desc">A full screenshot set of the Flask app so clients can review the interface flow from the home page to forms and the records table.</p>
    </section>

    <section class="gallery">
      <figure>
        <a href="student1.png" target="_blank" rel="noopener noreferrer">
          <img src="student1.png" alt="Student Management System home page">
        </a>
        <figcaption><strong>Home Page</strong><span>Main dashboard and landing view.</span></figcaption>
      </figure>
      <figure>
        <a href="student2.png" target="_blank" rel="noopener noreferrer">
          <img src="student2.png" alt="Student Management System about page">
        </a>
        <figcaption><strong>About Page</strong><span>Supporting information and navigation.</span></figcaption>
      </figure>
      <figure>
        <a href="student3.png" target="_blank" rel="noopener noreferrer">
          <img src="student3.png" alt="Student Management System form screen">
        </a>
        <figcaption><strong>Student Form</strong><span>Registration and input flow.</span></figcaption>
      </figure>
      <figure>
        <a href="student4.png" target="_blank" rel="noopener noreferrer">
          <img src="student4.png" alt="Student Management System all students table">
        </a>
        <figcaption><strong>All Students</strong><span>Records table and management view.</span></figcaption>
      </figure>
    </section>

    <div class="hint">Tip: click any screenshot to open it full size in a new tab.</div>
  </div>
</body>
</html>
